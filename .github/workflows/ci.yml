name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: js
        run: pnpm install --ignore-scripts

      - name: Build library
        working-directory: js
        run: pnpm --filter bs-map-classifier run build

      - name: Build extension & userscript
        working-directory: js
        run: pnpm --filter bs-pattern-overlay run build
