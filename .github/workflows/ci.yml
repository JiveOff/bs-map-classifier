name: CI

on:
  push:
    branches: ['**']
    tags: ['v[0-9]*']
  pull_request:
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  checks: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: js
        run: pnpm install --ignore-scripts

      - name: Build library
        working-directory: js
        run: pnpm --filter bs-map-classifier run build

      - name: Build extension & userscript
        working-directory: js
        run: pnpm --filter bs-pattern-overlay run build

      - name: Install Vue demo
        working-directory: js/lib/examples/vue-beatsaver
        run: pnpm install

      - name: Typecheck & build Vue demo
        working-directory: js/lib/examples/vue-beatsaver
        run: pnpm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-dist
          path: js/lib/dist/

  test:
    name: Test (Node ${{ matrix.node }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22', '24']

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: js
        run: pnpm install --ignore-scripts

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: lib-dist
          path: js/lib/dist/

      - name: Unit tests (ESM)
        working-directory: js/lib
        run: node --test --test-reporter=spec tests/*.test.js

      - name: Smoke test — CJS (require)
        working-directory: js/lib
        run: |
          node -e "
            const pkg = require('./dist/cjs/index.js');
            const fns = ['loadClassifierFromBuffers', 'classifyMap', 'parseBeatmap', 'computeFeatures', 'annotatePatterns'];
            for (const fn of fns) {
              if (typeof pkg[fn] !== 'function') throw new Error('CJS missing export: ' + fn);
            }
            console.log('CJS exports OK:', fns.join(', '));
          "

      - name: Smoke test — embedded ESM bundle
        working-directory: js/lib
        run: |
          node --input-type=module --eval "
            import { loadEmbeddedClassifier } from './dist/embedded.mjs';
            if (typeof loadEmbeddedClassifier !== 'function')
              throw new Error('embedded.mjs missing loadEmbeddedClassifier');
            console.log('embedded.mjs export OK');
          "

  integration:
    name: Integration (live BeatSaver)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: js
        run: pnpm install --ignore-scripts

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: lib-dist
          path: js/lib/dist/

      - name: Run integration tests
        working-directory: js/lib
        env:
          INTEGRATION: '1'
        run: node --test --test-reporter=spec tests/integration.test.js

  validate-onnx:
    name: ONNX smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install onnxruntime
        run: pip install onnxruntime numpy --quiet

      - name: Smoke test — pattern_classifier.onnx loads and produces valid output
        run: |
          python - <<'EOF'
          import json, sys
          import numpy as np
          import onnxruntime as rt

          CLASSES = {'Accuracy', 'Extreme', 'Speed', 'Standard', 'Tech'}
          MODEL   = 'models/onnx/pattern_classifier.onnx'
          META    = 'models/onnx/pattern_classifier_meta.json'

          meta = json.loads(open(META).read())
          n    = meta['n_features']
          assert set(meta['classes']) == CLASSES, f"Unexpected classes: {meta['classes']}"
          assert len(meta['imputer_medians']) == n, 'imputer_medians length mismatch'
          assert len(meta['scaler_mean'])     == n, 'scaler_mean length mismatch'
          assert len(meta['scaler_scale'])    == n, 'scaler_scale length mismatch'

          sess     = rt.InferenceSession(MODEL)
          inp_name = sess.get_inputs()[0].name
          dummy    = np.zeros((1, n), dtype=np.float32)
          labels, probs = sess.run(None, {inp_name: dummy})

          assert labels.shape == (1,),   f'Unexpected label shape: {labels.shape}'
          assert probs.shape  == (1, 5), f'Unexpected prob shape: {probs.shape}'
          # labels[0] is an integer class index (0–4); look it up in meta['classes']
          class_idx = int(labels[0])
          assert 0 <= class_idx < len(meta['classes']), f'Class index out of range: {class_idx}'
          assert abs(probs[0].sum() - 1.0) < 1e-4, 'Probabilities do not sum to 1'

          predicted = meta['classes'][class_idx]
          print(f'OK — {n} features, prediction: {predicted} ({probs[0].max():.1%})')
          EOF

  benchmark:
    name: Benchmark
    needs: build
    runs-on: ubuntu-latest
    # Only store results on main — PRs and branches still run the benchmark but don't push
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: js
        run: pnpm install --ignore-scripts

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: lib-dist
          path: js/lib/dist/

      - name: Run benchmark
        working-directory: js/lib
        env:
          BENCHMARK_OUTPUT: benchmark-results.json
        run: node scripts/benchmark.mjs

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        if: github.ref == 'refs/heads/main'
        with:
          name: bs-map-classifier
          tool: customSmallerIsBetter
          output-file-path: js/lib/benchmark-results.json
          gh-pages-branch: gh-benchmarks
          benchmark-data-dir-path: benchmarks
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: false
