<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BS Pattern Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 220px; background: #0d1117; color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 12px; padding: 14px;
}
h1 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
p { color: #8b949e; font-size: 11px; line-height: 1.6; margin-bottom: 10px; }
a {
  display: block; padding: 7px 10px; border-radius: 6px;
  background: #238636; color: #fff; text-align: center;
  font-size: 11px; font-weight: 600; text-decoration: none;
  transition: background .12s;
}
a:hover { background: #2ea043; }
</style>
</head>
<body>
<h1>BS Pattern Overlay</h1>
<p>Open a map in ArcViewer — the overlay appears automatically on the right side of the page.</p>
<a href="https://allpoland.github.io/ArcViewer/" target="_blank">Open ArcViewer ↗</a>
</body>
</html>
