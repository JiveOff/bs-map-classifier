<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BS Map Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #05050a;
      --surface:  rgba(255,255,255,0.035);
      --border:   rgba(255,255,255,0.07);
      --text:     #cbd5e1;
      --muted:    #475569;
      --tech:     #c084fc;
      --speed:    #fb923c;
      --accuracy: #38bdf8;
      --standard: #4ade80;
      --extreme:  #fbbf24;
      --active:   var(--tech);
    }

    html { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; min-height: 100vh; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; }

    header { text-align: center; margin-bottom: 48px; }

    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 12px; }

    .saber { width: 28px; height: 4px; border-radius: 2px; box-shadow: 0 0 8px currentColor, 0 0 20px currentColor; }
    .saber.red  { background: #ef4444; color: #ef4444; }
    .saber.blue { background: #60a5fa; color: #60a5fa; }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: #fff;
      text-transform: uppercase;
    }

    .tagline { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 6px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      padding: 8px 14px 10px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: #fff; border-bottom-color: #fff; }

    /* ── Mode panels ── */
    .mode { display: none; }
    .mode.active { display: block; }

    /* ── Inputs ── */
    .input-row { display: flex; gap: 10px; margin-bottom: 14px; }

    .field {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .field.mono-big {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .field::placeholder { color: var(--muted); font-weight: 400; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.06em; font-size: 0.82rem; }
    .field:focus { border-color: rgba(255,255,255,0.25); box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }

    /* File drop zone */
    .dropzone {
      border: 1px dashed var(--border);
      border-radius: 3px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 14px;
      position: relative;
    }

    .dropzone:hover, .dropzone.drag { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.03); }
    .dropzone.has-file { border-style: solid; border-color: rgba(255,255,255,0.2); }

    .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

    .drop-icon { font-size: 1.4rem; margin-bottom: 8px; opacity: 0.4; }
    .drop-label { font-size: 0.72rem; letter-spacing: 0.1em; color: var(--muted); }
    .drop-label strong { color: var(--text); display: block; margin-top: 4px; font-size: 0.8rem; letter-spacing: 0.06em; }

    .selects { display: flex; gap: 10px; margin-bottom: 14px; }

    select {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
      appearance: none;
      transition: border-color 0.2s, opacity 0.2s, color 0.2s;
    }

    select:disabled { opacity: 0.3; cursor: not-allowed; color: var(--muted); }
    select:not(:disabled) { border-color: rgba(255,255,255,0.12); }
    select:focus { border-color: rgba(255,255,255,0.25); }
    select option { background: #0f0f18; }

    @keyframes selectPop {
      0%   { border-color: rgba(255,255,255,0.5); box-shadow: 0 0 0 1px rgba(255,255,255,0.15); }
      100% { border-color: rgba(255,255,255,0.12); box-shadow: none; }
    }
    .select-loaded { animation: selectPop 0.6s ease; }

    .btn-classify {
      width: 100%;
      padding: 12px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 3px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-classify:hover { opacity: 0.88; }
    .btn-classify:active { transform: scale(0.98); }
    .btn-classify:disabled { opacity: 0.35; cursor: not-allowed; }

    .status { font-size: 0.72rem; letter-spacing: 0.08em; color: var(--muted); min-height: 18px; transition: color 0.2s; margin-top: 14px; }
    .status.error { color: #f87171; }

    /* ── Loader ── */
    .loader { display: none; flex-direction: column; align-items: center; gap: 20px; padding: 32px 0; }
    .loader.visible { display: flex; }

    .spinner { width: 48px; height: 48px; border: 2px solid var(--border); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); animation: pulse 1.4s ease-in-out infinite; }

    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ── Results ── */
    .results { display: none; }
    .results.visible { display: block; }

    .map-meta { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 20px; line-height: 1.6; }
    .map-meta strong { color: var(--text); }

    .category-badge { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }

    .category-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 10vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--active);
      text-shadow: 0 0 30px var(--active), 0 0 60px var(--active);
      line-height: 1;
      transition: color 0.4s, text-shadow 0.4s;
    }

    .confidence { font-size: 1rem; color: var(--muted); letter-spacing: 0.05em; }

    .probs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

    .prob-row { display: grid; grid-template-columns: 90px 1fr 52px; align-items: center; gap: 12px; }

    .prob-label { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .prob-label.active { color: var(--text); }

    .prob-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }

    .prob-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); width: 0; }

    .prob-pct { font-size: 0.68rem; letter-spacing: 0.05em; color: var(--muted); text-align: right; }
    .prob-pct.active { color: var(--text); }

    .patterns-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

    .patterns-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .pattern-chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 10px;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pattern-chip span { color: var(--active); font-weight: 700; }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 48px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      line-height: 2;
    }

    footer a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results.visible .panel { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <div class="saber red"></div>
        <h1>BS Map Classifier</h1>
        <div class="saber blue"></div>
      </div>
      <p class="tagline">ML-powered Beat Saber map classification · 87.97% CV F1</p>
    </header>

    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="key">Map Key</button>
        <button class="tab" data-tab="zip">Zip File</button>
        <button class="tab" data-tab="dat">.dat File</button>
      </div>

      <!-- Map key mode -->
      <div class="mode active" id="mode-key">
        <div class="input-row">
          <input class="field mono-big" id="mapKey" type="text" placeholder="map key (e.g. 2b120)" spellcheck="false" autocomplete="off">
        </div>
        <div class="selects">
          <select id="key-characteristic" disabled>
            <option>— enter key —</option>
          </select>
          <select id="key-difficulty" disabled>
            <option>— enter key —</option>
          </select>
        </div>
      </div>

      <!-- Zip file mode -->
      <div class="mode" id="mode-zip">
        <div class="dropzone" id="zip-drop">
          <input type="file" id="zip-file" accept=".zip">
          <div class="drop-icon">📦</div>
          <div class="drop-label">drop a map zip or click to browse<strong id="zip-name"></strong></div>
        </div>
        <div class="selects">
          <select id="zip-characteristic" disabled>
            <option>— upload zip —</option>
          </select>
          <select id="zip-difficulty" disabled>
            <option>— upload zip —</option>
          </select>
        </div>
      </div>

      <!-- .dat file mode -->
      <div class="mode" id="mode-dat">
        <div class="dropzone" id="dat-drop">
          <input type="file" id="dat-file" accept=".dat">
          <div class="drop-icon">🗂️</div>
          <div class="drop-label">drop a difficulty .dat file or click to browse<strong id="dat-name"></strong></div>
        </div>
        <div class="input-row">
          <input class="field" id="dat-bpm" type="number" placeholder="BPM (required)" min="1" max="999" step="0.01">
        </div>
      </div>

      <button class="btn-classify" id="classifyBtn">Classify</button>
      <div class="status" id="status"></div>
    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text" id="loaderText">INITIALISING MODEL</div>
    </div>

    <div class="results" id="results">
      <div class="panel">
        <div class="map-meta" id="mapMeta"></div>
        <div class="category-badge">
          <div class="category-name" id="categoryName">—</div>
          <div class="confidence" id="confidence"></div>
        </div>
        <div class="probs" id="probs"></div>
        <div class="patterns-label">// top patterns</div>
        <div class="patterns-grid" id="patternsGrid"></div>
      </div>
    </div>
  </div>

  <footer>
    <a href="https://github.com/JiveOff/bs-map-classifier">GitHub</a> ·
    <a href="https://www.npmjs.com/package/bs-map-classifier">npm</a> ·
    data from <a href="https://beatsaver.com">BeatSaver</a>
  </footer>

  <script type="module">
    import * as ort from 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.mjs';
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/';
    ort.env.wasm.numThreads = 1;

    import { setOrtInstance, parseBeatmap, findDatFilename, extractPatternsAndClassifyMap } from 'https://esm.sh/bs-map-classifier';
    import { unzipSync } from 'https://esm.sh/fflate';

    setOrtInstance(ort);

    const COLORS = { Tech: '#c084fc', Speed: '#fb923c', Accuracy: '#38bdf8', Standard: '#4ade80', Extreme: '#fbbf24' };
    const RANK       = { ExpertPlus: 5, Expert: 4, Hard: 3, Normal: 2, Easy: 1 };
    const DIFF_LABEL = { ExpertPlus: 'Expert+', Expert: 'Expert', Hard: 'Hard', Normal: 'Normal', Easy: 'Easy' };
    const CHAR_LABEL = { Standard: 'Standard', OneSaber: 'One Saber', NoArrows: 'No Arrows', '90Degree': '90°', '360Degree': '360°', Lightshow: 'Lightshow', Lawless: 'Lawless' };

    let classifierPromise = null;
    function getClassifier() {
      if (!classifierPromise)
        classifierPromise = import('https://esm.sh/bs-map-classifier/embedded').then(m => m.loadEmbeddedClassifier());
      return classifierPromise;
    }

    const $ = id => document.getElementById(id);
    const setStatus  = (msg, err = false) => { $('status').textContent = msg; $('status').className = 'status' + (err ? ' error' : ''); };
    const setLoading = (visible, msg = '') => { $('loader').className = 'loader' + (visible ? ' visible' : ''); $('loaderText').textContent = msg; };
    const setResults = v => { $('results').className = 'results' + (v ? ' visible' : ''); };
    const decode     = buf => new TextDecoder().decode(buf);
    const readFile   = file => new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsArrayBuffer(file); });

    // ── Populate characteristic / difficulty selects from a pairs array ──
    function populateSelects(charSel, diffSel, pairs) {
      const prevChar = charSel.value;
      const prevDiff = diffSel.value;

      const chars = [...new Set(pairs.map(p => p.characteristic))];
      charSel.innerHTML = chars.map(c => `<option value="${c}">${CHAR_LABEL[c] ?? c}</option>`).join('');
      if (chars.includes(prevChar)) charSel.value = prevChar;
      charSel.disabled = false;

      function syncDiffs() {
        const char  = charSel.value;
        const diffs = pairs
          .filter(p => p.characteristic === char)
          .sort((a, b) => (RANK[b.difficulty] ?? 0) - (RANK[a.difficulty] ?? 0))
          .map(p => p.difficulty);
        diffSel.innerHTML = diffs.map(d => `<option value="${d}">${DIFF_LABEL[d] ?? d}</option>`).join('');
        if (diffs.includes(prevDiff)) diffSel.value = prevDiff;
        diffSel.disabled = false;
      }

      charSel.onchange = syncDiffs;
      syncDiffs();

      // Flash both selects to signal they just populated
      [charSel, diffSel].forEach(s => {
        s.classList.remove('select-loaded');
        void s.offsetWidth; // reflow to restart animation
        s.classList.add('select-loaded');
      });
    }

    function pairsFromInfoDat(infoDat) {
      const pairs = [];
      for (const set of infoDat._difficultyBeatmapSets ?? []) {
        const char = set._beatmapCharacteristicName;
        for (const bm of set._difficultyBeatmaps ?? []) pairs.push({ characteristic: char, difficulty: bm._difficulty });
      }
      for (const bm of infoDat.difficultyBeatmaps ?? [])
        pairs.push({ characteristic: bm.characteristic ?? 'Standard', difficulty: bm.difficulty });
      return pairs;
    }

    // ── BeatSaver API cache + debounced key lookup ──
    const bsCache = {};
    let keyTimer  = null;

    async function fetchBSInfo(key) {
      if (!bsCache[key]) {
        const r = await fetch(`https://beatsaver.com/api/maps/id/${key}`);
        if (!r.ok) throw new Error(`map "${key}" not found`);
        bsCache[key] = await r.json();
      }
      return bsCache[key];
    }

    $('mapKey').addEventListener('input', () => {
      clearTimeout(keyTimer);
      const key = $('mapKey').value.trim().toLowerCase();
      if (!key) return;
      keyTimer = setTimeout(async () => {
        try {
          const info  = await fetchBSInfo(key);
          const pairs = info.versions.at(-1).diffs.map(d => ({ characteristic: d.characteristic, difficulty: d.difficulty }));
          populateSelects($('key-characteristic'), $('key-difficulty'), pairs);
        } catch { /* leave selects as-is */ }
      }, 400);
    });

    // ── Tabs ──
    let activeTab = 'key';
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
        document.querySelectorAll('.mode').forEach(m => m.classList.toggle('active', m.id === `mode-${activeTab}`));
        setStatus('');
      });
    });

    // ── File inputs ──
    // input.files is read-only, so we track dropped files separately
    const droppedFiles = {};
    let zipBuf = null;

    async function onZipFile(file) {
      droppedFiles['zip-file'] = file;
      showName('zip-name', file.name, $('zip-drop'));
      try {
        zipBuf = await readFile(file);
        const files   = unzipSync(new Uint8Array(zipBuf));
        const getF    = name => { const k = Object.keys(files).find(k => k.toLowerCase() === name.toLowerCase()); return k ? files[k] : null; };
        const infoRaw = getF('Info.dat') ?? getF('info.dat');
        if (infoRaw) {
          const pairs = pairsFromInfoDat(JSON.parse(decode(infoRaw)));
          if (pairs.length) populateSelects($('zip-characteristic'), $('zip-difficulty'), pairs);
        }
      } catch { /* ignore parse errors */ }
    }

    function setupDrop(dropId, inputId, nameId) {
      const drop  = $(dropId);
      const input = $(inputId);
      drop.addEventListener('dragover',  e => { e.preventDefault(); drop.classList.add('drag'); });
      drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
      drop.addEventListener('drop', e => {
        e.preventDefault();
        drop.classList.remove('drag');
        const f = e.dataTransfer.files[0];
        if (!f) return;
        if (inputId === 'zip-file') { onZipFile(f); } else { droppedFiles[inputId] = f; showName(nameId, f.name, drop); }
      });
      input.addEventListener('change', () => {
        if (!input.files[0]) return;
        if (inputId === 'zip-file') { onZipFile(input.files[0]); } else { droppedFiles[inputId] = null; showName(nameId, input.files[0].name, drop); }
      });
    }

    function getFile(inputId) {
      return droppedFiles[inputId] ?? $(inputId).files[0] ?? null;
    }

    function showName(nameId, name, drop) {
      $(nameId).textContent = name;
      drop.classList.add('has-file');
    }

    setupDrop('zip-drop', 'zip-file', 'zip-name');
    setupDrop('dat-drop', 'dat-file', 'dat-name');

    // ── Classify ──
    $('classifyBtn').addEventListener('click', async () => {
      $('classifyBtn').disabled = true;
      setStatus('');
      setResults(false);
      setLoading(true, 'LOADING MODEL');

      try {
        const clf = await getClassifier();

        if (activeTab === 'key') {
          await classifyFromKey(clf);
        } else if (activeTab === 'zip') {
          await classifyFromZip(clf);
        } else {
          await classifyFromDat(clf);
        }
      } catch (e) {
        setLoading(false);
        setStatus(e.message, true);
      } finally {
        $('classifyBtn').disabled = false;
      }
    });

    async function classifyFromKey(clf) {
      const key  = $('mapKey').value.trim().toLowerCase();
      if (!key) throw new Error('enter a map key first');

      setLoading(true, 'FETCHING MAP');
      const info    = await fetchBSInfo(key);
      const version = info.versions.at(-1);

      // Populate selects if not yet done (user clicked without waiting for debounce)
      if ($('key-characteristic').disabled) {
        const pairs = version.diffs.map(d => ({ characteristic: d.characteristic, difficulty: d.difficulty }));
        populateSelects($('key-characteristic'), $('key-difficulty'), pairs);
      }

      const char = $('key-characteristic').value;
      const diff = $('key-difficulty').value;
      const chosen = version.diffs.find(d => d.characteristic === char && d.difficulty === diff)
                  ?? [...version.diffs].sort((a, b) => (RANK[b.difficulty] ?? 0) - (RANK[a.difficulty] ?? 0))[0];

      setLoading(true, 'DOWNLOADING ZIP');
      const buf = await fetch(`https://cdn.beatsaver.com/${version.hash}.zip`).then(r => r.arrayBuffer());

      setLoading(true, 'CLASSIFYING');
      const { datJson } = extractDat(buf, chosen.characteristic, chosen.difficulty);
      const beatmap = parseBeatmap(datJson);
      const result  = await extractPatternsAndClassifyMap(beatmap, info.metadata.bpm, clf);

      setLoading(false);
      const meta = `<strong>${info.metadata.songName}</strong> — ${info.metadata.songAuthorName}<br>` +
                   `mapped by ${info.metadata.levelAuthorName} · ${chosen.characteristic} / ${chosen.difficulty} · ${info.metadata.bpm} BPM`;
      renderResults(meta, result);
    }

    async function classifyFromZip(clf) {
      const file = getFile('zip-file');
      if (!file) throw new Error('select a zip file first');
      if ($('zip-characteristic').disabled) throw new Error('waiting for zip to parse — try again');

      const char = $('zip-characteristic').value;
      const diff = $('zip-difficulty').value;

      setLoading(true, 'READING ZIP');
      const buf  = zipBuf ?? await readFile(file);
      const { datJson, infoDat, bpm } = extractDat(buf, char, diff);

      setLoading(true, 'CLASSIFYING');
      const beatmap = parseBeatmap(datJson);
      const result  = await extractPatternsAndClassifyMap(beatmap, bpm ?? 120, clf);

      setLoading(false);
      const songName = infoDat?._songName ?? file.name.replace('.zip', '');
      const meta = `<strong>${songName}</strong> · ${char} / ${diff}` + (bpm ? ` · ${bpm} BPM` : '');
      renderResults(meta, result);
    }

    async function classifyFromDat(clf) {
      const file = getFile('dat-file');
      const bpm  = parseFloat($('dat-bpm').value);
      if (!file) throw new Error('select a .dat file first');
      if (!bpm || bpm <= 0) throw new Error('enter the map BPM');

      setLoading(true, 'READING FILE');
      const buf     = await readFile(file);
      const datJson = JSON.parse(decode(new Uint8Array(buf)));

      setLoading(true, 'CLASSIFYING');
      const beatmap = parseBeatmap(datJson);
      const result  = await extractPatternsAndClassifyMap(beatmap, bpm, clf);

      setLoading(false);
      renderResults(`<strong>${file.name}</strong> · ${bpm} BPM`, result);
    }

    function extractDat(buf, char, diff) {
      const files   = unzipSync(new Uint8Array(buf));
      const getFile = name => { const k = Object.keys(files).find(k => k.toLowerCase() === name.toLowerCase()); return k ? files[k] : null; };

      const infoRaw = getFile('Info.dat') ?? getFile('info.dat');
      if (!infoRaw) throw new Error('Info.dat not found in zip');
      const infoDat = JSON.parse(decode(infoRaw));

      const bpm      = infoDat._beatsPerMinute ?? null;
      const datName  = findDatFilename(infoDat, char, diff);
      const datRaw   = getFile(datName);
      if (!datRaw) throw new Error(`"${datName}" not found in zip — check characteristic/difficulty`);

      return { datJson: JSON.parse(decode(datRaw)), infoDat, bpm };
    }

    function renderResults(meta, result) {
      const { category, confidence, probabilities } = result.classification;
      const color = COLORS[category] ?? '#fff';
      document.documentElement.style.setProperty('--active', color);

      $('mapMeta').innerHTML        = meta;
      $('categoryName').textContent = category.toUpperCase();
      $('confidence').textContent   = `${(confidence * 100).toFixed(1)}%`;

      $('probs').innerHTML = Object.entries(probabilities)
        .sort((a, b) => b[1] - a[1])
        .map(([cls, p]) => {
          const c = COLORS[cls] ?? '#fff', pct = (p * 100).toFixed(1), act = cls === category;
          return `<div class="prob-row">
            <div class="prob-label${act ? ' active' : ''}">${cls}</div>
            <div class="prob-track"><div class="prob-fill" style="width:${pct}%;background:${c};box-shadow:0 0 6px ${c}"></div></div>
            <div class="prob-pct${act ? ' active' : ''}">${pct}%</div>
          </div>`;
        }).join('');

      const counts = {};
      for (const p of result.patterns) counts[p.type] = (counts[p.type] ?? 0) + 1;
      $('patternsGrid').innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1]).slice(0, 8)
        .map(([type, n]) => `<div class="pattern-chip">${type.replace(/_/g,' ')} <span>×${n}</span></div>`)
        .join('');

      setResults(true);
    }

    // Enter triggers classify from any text/number input
    document.querySelectorAll('input[type=text], input[type=number]').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') $('classifyBtn').click(); });
    });
  </script>
</body>
</html>
